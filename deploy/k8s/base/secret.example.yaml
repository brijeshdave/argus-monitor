# Argus — Monitoring Platform · Author: Brijesh Dave <https://github.com/brijeshdave>
# EXAMPLE only — never commit real secrets. In production use sealed-secrets or an
# external secrets operator. Create with:
#   kubectl create secret generic argus-secrets -n argus \
#     --from-literal=ENCRYPTION_KEY=$(./argus gen-key) \
#     --from-literal=JWT_SECRET=$(openssl rand -base64 32) \
#     --from-literal=MASTER_DATABASE_URL=postgres://... \
#     --from-literal=TELEMETRY_DATABASE_URL=postgres://... \
#     --from-literal=REDIS_URL=redis://redis:6379
apiVersion: v1
kind: Secret
metadata:
  name: argus-secrets
  namespace: argus
type: Opaque
stringData:
  ENCRYPTION_KEY: "REPLACE_WITH_32_BYTE_BASE64"
  JWT_SECRET: "REPLACE_ME"
  ADMIN_PASSWORD: "REPLACE_ME"
  MASTER_DATABASE_URL: "postgres://argus:argus@postgres:5432/argus_master"
  TELEMETRY_DATABASE_URL: "postgres://argus:argus@postgres:5432/argus_telemetry"
  REDIS_URL: "redis://redis:6379"
