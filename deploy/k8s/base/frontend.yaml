# Argus — Monitoring Platform · Author: Brijesh Dave <https://github.com/brijeshdave>
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-frontend
  namespace: argus
  labels: { app.kubernetes.io/name: argus-frontend, app.kubernetes.io/part-of: argus }
spec:
  replicas: 2
  selector:
    matchLabels: { app.kubernetes.io/name: argus-frontend }
  template:
    metadata:
      labels: { app.kubernetes.io/name: argus-frontend }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/brijeshdave/argus-frontend:latest
          ports: [{ containerPort: 80 }]
          resources:
            requests: { cpu: "20m", memory: "32Mi" }
            limits: { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: argus-frontend
  namespace: argus
spec:
  selector: { app.kubernetes.io/name: argus-frontend }
  ports: [{ name: http, port: 80, targetPort: 80 }]
