# Argus — Monitoring Platform · Author: Brijesh Dave <https://github.com/brijeshdave>
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-backend
  namespace: argus
  labels: { app.kubernetes.io/name: argus-backend, app.kubernetes.io/part-of: argus }
spec:
  replicas: 2
  selector:
    matchLabels: { app.kubernetes.io/name: argus-backend }
  template:
    metadata:
      labels: { app.kubernetes.io/name: argus-backend }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 10001 }
      containers:
        - name: backend
          image: ghcr.io/brijeshdave/argus-backend:latest
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: argus-config }
            - secretRef: { name: argus-secrets }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "192Mi" }
            limits: { cpu: "1", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: argus-backend
  namespace: argus
spec:
  selector: { app.kubernetes.io/name: argus-backend }
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
