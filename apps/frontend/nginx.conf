# Argus — Monitoring Platform · Author: Brijesh Dave <https://github.com/brijeshdave>
# Serves the SPA and reverse-proxies API + WebSocket to the backend service.
# Works whether or not an outer reverse proxy is present (see docs/deployment).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API
  location /api/ {
    proxy_pass http://backend:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # WebSocket (operator live state + agent control plane terminate on backend)
  location /ws {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
